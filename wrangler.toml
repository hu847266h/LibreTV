name = "libretv"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Cloudflare Pages bindings
# wrangler.toml 中声明绑定后，CF Pages 会自动应用。
# 同时需要在 Dashboard 确认绑定已生效：
#   Pages 项目 → Settings → Functions → KV/D1 namespace bindings

[[kv_namespaces]]
binding = "SESSIONS"
id = "12a21fcdafe34082b95089642077b232"

[[d1_databases]]
binding = "DB"
database_name = "libretv-db"
database_id = "f5e416af-cc48-4047-8acf-6614299026ed"
