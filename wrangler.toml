name = "libretv"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Cloudflare Pages bindings
# 一键设置（推荐）：配置环境变量后运行 npm run setup
#   set CLOUDFLARE_API_TOKEN=xxxx
#   set CLOUDFLARE_ACCOUNT_ID=xxxx
#   npm run setup
#
# 手动创建：
#   wrangler kv namespace create LIBRETV_SESSIONS
#   wrangler d1 create libretv-db
#   wrangler d1 execute libretv-db --file=./schema.sql --remote

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_KV_ID"          # npm run setup 会自动替换
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[d1_databases]]
binding = "DB"
database_name = "libretv-db"
database_id = "REPLACE_WITH_D1_ID" # npm run setup 会自动替换
